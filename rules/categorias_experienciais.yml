metadata:
  nome_arquivo: "categorias_experienciais.yml"
  versao: "1.0"
  data_criacao: "2026-06-16"
  finalidade: "Definir dicionario tecnico de categorias experienciais para uso futuro por scripts de classificacao, sem executar classificacao nesta etapa."
  uso_previsto: "Apoiar scripts posteriores na identificacao auditavel de temas ligados a percepcao subjetiva, experiencia emocional e relacao simbolica do publico com o evento."
  restricoes:
    - "Nao executar classificacao automaticamente a partir deste arquivo nesta etapa."
    - "Nao substituir revisao humana quando houver ambiguidade emocional ou simbolica."
    - "Nao gerar diagnostico estrategico, reputacional ou interpretativo."
    - "Nao inferir sentimento sem evidencia textual direta."

categorias:
  - id: "desejo"
    nome: "desejo"
    descricao: "Captura manifestacoes de vontade, interesse, vontade de estar presente ou atracao pelo evento."
    tipo_categoria: "experiencial"
    palavras_chave: ["quero", "queria", "vontade", "desejo", "preciso ir", "sonho", "ansioso", "ansiosa", "imperdivel"]
    expressoes_equivalentes: ["queria muito ir", "preciso estar nesse evento", "me deu vontade", "sonho em viver isso"]
    exemplos_comentarios: ["Queria muito ter ido nessa edição.", "Esse evento me deu muita vontade de participar."]
    criterios_inclusao: "Incluir quando o comentario expressar vontade direta ou atracao pela experiencia."
    criterios_exclusao: "Nao incluir elogios genericos sem indicio claro de vontade ou desejo."
    peso_inicial: 2
    observacoes: "Desejo pode aparecer antes ou depois do evento; evitar inferir interesse sem frase explicita."

  - id: "expectativa"
    nome: "expectativa"
    descricao: "Captura antecipacao, promessa percebida, espera por uma experiencia futura ou comparacao com o que se imaginava."
    tipo_categoria: "experiencial"
    palavras_chave: ["expectativa", "esperava", "ansiedade", "prometia", "imaginava", "achei que", "aguardava", "contando os dias"]
    expressoes_equivalentes: ["estava esperando muito", "minha expectativa era alta", "achei que seria melhor", "prometia demais"]
    exemplos_comentarios: ["Eu estava com muita expectativa para esse evento.", "Esperava mais da experiência."]
    criterios_inclusao: "Incluir quando houver mencao ao que a pessoa esperava antes ou durante a experiencia."
    criterios_exclusao: "Nao incluir surpresa ou avaliacao final sem referencia a expectativa previa."
    peso_inicial: 2
    observacoes: "Pode se ligar a frustracao ou encanto; a categoria captura a expectativa em si."

  - id: "frustracao"
    nome: "frustração"
    descricao: "Captura quebra de expectativa, insatisfacao subjetiva, sensacao de que a experiencia nao correspondeu ao esperado."
    tipo_categoria: "experiencial"
    palavras_chave: ["frustracao", "frustração", "frustrado", "decepcionado", "esperava mais", "broxei", "desanimei", "chateado"]
    expressoes_equivalentes: ["me frustrei", "nao era o que eu esperava", "sai decepcionado", "esperava bem mais"]
    exemplos_comentarios: ["Saí frustrada porque esperava outra energia.", "Achei que seria melhor e me decepcionei."]
    criterios_inclusao: "Incluir quando houver indicio textual de quebra de expectativa ou insatisfacao emocional."
    criterios_exclusao: "Nao incluir critica operacional isolada sem expressao de frustracao subjetiva."
    peso_inicial: 3
    observacoes: "Evitar transformar qualquer problema operacional em frustracao sem evidência textual."

  - id: "pertencimento"
    nome: "pertencimento"
    descricao: "Captura sensacao de fazer parte de um grupo, comunidade, cena, publico ou identidade coletiva ligada ao evento."
    tipo_categoria: "experiencial"
    palavras_chave: ["pertencimento", "comunidade", "minha galera", "nosso lugar", "me senti parte", "familia", "família", "tribo"]
    expressoes_equivalentes: ["me senti em casa", "era a minha galera", "todo mundo junto", "senti que eu pertencia"]
    exemplos_comentarios: ["Me senti em casa nesse evento.", "Era exatamente a minha galera reunida."]
    criterios_inclusao: "Incluir quando o comentario expressar vinculo coletivo, comunidade ou sensacao de pertencimento."
    criterios_exclusao: "Nao incluir mencao a amigos apenas como companhia sem sentido coletivo."
    peso_inicial: 3
    observacoes: "Pode se sobrepor a acolhimento e identificacao; preservar diferenca entre grupo e identidade individual."

  - id: "acolhimento"
    nome: "acolhimento"
    descricao: "Captura sensacao de cuidado, recepcao, respeito, inclusao, seguranca emocional ou ambiente receptivo."
    tipo_categoria: "experiencial"
    palavras_chave: ["acolhimento", "acolhido", "recebido", "cuidado", "respeito", "seguro", "confortavel", "inclusivo", "bem-vindo"]
    expressoes_equivalentes: ["me senti acolhido", "ambiente respeitoso", "fui muito bem recebido", "me senti segura ali"]
    exemplos_comentarios: ["Me senti muito acolhida no evento.", "O ambiente era respeitoso e confortável."]
    criterios_inclusao: "Incluir quando a pessoa relatar cuidado, recepcao positiva ou seguranca emocional."
    criterios_exclusao: "Nao incluir seguranca fisica operacional sem indicio de acolhimento subjetivo."
    peso_inicial: 3
    observacoes: "Pode aparecer como elogio amplo; exigir pista textual de cuidado, inclusao ou recepcao."

  - id: "identificacao"
    nome: "identificação"
    descricao: "Captura reconhecimento pessoal com o evento, marca, publico, estetica, linguagem ou proposta cultural."
    tipo_categoria: "experiencial"
    palavras_chave: ["identificacao", "identificação", "me representa", "minha cara", "combina comigo", "me vejo", "representatividade"]
    expressoes_equivalentes: ["esse evento me representa", "tem tudo a ver comigo", "me identifiquei demais", "parece feito para mim"]
    exemplos_comentarios: ["Me identifiquei muito com a proposta.", "Esse evento tem a minha cara."]
    criterios_inclusao: "Incluir quando houver reconhecimento pessoal ou simbolico com a proposta do evento."
    criterios_exclusao: "Nao incluir preferencia ou elogio sem relacao de identificacao pessoal."
    peso_inicial: 3
    observacoes: "Diferenciar de pertencimento: aqui o foco e reconhecimento individual."

  - id: "decepcao"
    nome: "decepção"
    descricao: "Captura desapontamento, perda de confianca emocional ou avaliacao subjetiva negativa da experiencia."
    tipo_categoria: "experiencial"
    palavras_chave: ["decepcao", "decepção", "decepcionado", "triste", "chateado", "nao volto", "arrependi", "desapontado"]
    expressoes_equivalentes: ["foi uma decepção", "me arrependi de ir", "sai chateado", "nao esperava isso de voces"]
    exemplos_comentarios: ["Foi uma decepção para mim.", "Saí chateado com a experiência."]
    criterios_inclusao: "Incluir quando o comentario expressar desapontamento emocional direto."
    criterios_exclusao: "Nao incluir frustracao leve quando nao houver sinal de decepção ou desapontamento."
    peso_inicial: 3
    observacoes: "Pode se sobrepor a frustracao; decepção tende a indicar desapontamento mais conclusivo."

  - id: "encanto"
    nome: "encanto"
    descricao: "Captura encantamento, surpresa positiva, admiracao ou experiencia percebida como especial."
    tipo_categoria: "experiencial"
    palavras_chave: ["encanto", "encantado", "mágico", "magico", "perfeito", "lindo", "incrivel", "incrível", "maravilhoso", "surreal"]
    expressoes_equivalentes: ["foi mágico", "experiência linda", "me surpreendeu positivamente", "sai encantado"]
    exemplos_comentarios: ["Foi uma experiência mágica.", "Saí encantada com tudo."]
    criterios_inclusao: "Incluir quando houver admiracao emocional ou surpresa positiva explicitamente expressa."
    criterios_exclusao: "Nao incluir elogios tecnicos isolados sem componente de encantamento."
    peso_inicial: 3
    observacoes: "Evitar classificar todo elogio como encanto; buscar intensidade ou linguagem emocional."

  - id: "intencao_de_retorno"
    nome: "intenção de retorno"
    descricao: "Captura vontade declarada de voltar, participar de proximas edicoes ou repetir a experiencia."
    tipo_categoria: "experiencial"
    palavras_chave: ["volto", "voltaria", "proxima", "próxima", "de novo", "retorno", "repetir", "ano que vem", "sempre"]
    expressoes_equivalentes: ["volto com certeza", "ano que vem estou la", "quero ir de novo", "na proxima eu vou"]
    exemplos_comentarios: ["Ano que vem eu volto com certeza.", "Quero viver isso de novo."]
    criterios_inclusao: "Incluir quando o comentario indicar retorno futuro ou repeticao da experiencia."
    criterios_exclusao: "Nao incluir nostalgia sem indicio de vontade de retornar."
    peso_inicial: 3
    observacoes: "Pode ser positivo, condicionado ou ironico; evitar leitura automatica quando houver ambiguidade."

  - id: "memoria_afetiva"
    nome: "memória afetiva"
    descricao: "Captura lembrancas, nostalgia, vinculo emocional com experiencias passadas ou marca afetiva deixada pelo evento."
    tipo_categoria: "experiencial"
    palavras_chave: ["memoria", "memória", "lembranca", "lembrança", "nostalgia", "saudade", "inesquecivel", "marcou", "recordacao"]
    expressoes_equivalentes: ["ficou na memoria", "vou lembrar para sempre", "me deu saudade", "marcou minha vida"]
    exemplos_comentarios: ["Esse dia ficou na memória.", "Foi uma lembrança que vou guardar."]
    criterios_inclusao: "Incluir quando o comentario falar de lembranca emocional, saudade ou marca afetiva."
    criterios_exclusao: "Nao incluir simples relato cronologico sem carga afetiva."
    peso_inicial: 2
    observacoes: "Pode aparecer em comentarios pos-evento; nao inferir memoria afetiva apenas por foto ou registro."

  - id: "rejeicao"
    nome: "rejeição"
    descricao: "Captura afastamento, recusa, aversao ou declaracao de nao querer participar ou se associar ao evento."
    tipo_categoria: "experiencial"
    palavras_chave: ["nao vou", "não vou", "nunca mais", "passo", "dispenso", "rejeito", "ranço", "horrivel", "horrível", "fora"]
    expressoes_equivalentes: ["nunca mais piso ai", "nao volto", "isso nao e para mim", "passo longe"]
    exemplos_comentarios: ["Nunca mais volto nesse evento.", "Isso definitivamente não é para mim."]
    criterios_inclusao: "Incluir quando houver recusa, afastamento ou rejeicao simbolica da experiencia."
    criterios_exclusao: "Nao incluir critica pontual quando ainda houver intencao de retorno ou ausencia de recusa."
    peso_inicial: 3
    observacoes: "Pode ser ironica; classificacao futura deve preservar justificativa textual."

  - id: "status"
    nome: "status"
    descricao: "Captura associacao do evento a prestigio, exclusividade, imagem social, pertencimento aspiracional ou visibilidade."
    tipo_categoria: "experiencial"
    palavras_chave: ["status", "vip", "exclusivo", "famosos", "chique", "elite", "hype", "trend", "presenca", "visibilidade"]
    expressoes_equivalentes: ["evento de gente bonita", "todo mundo queria estar la", "muito exclusivo", "so tinha gente conhecida"]
    exemplos_comentarios: ["Parecia o evento mais exclusivo da cidade.", "Todo mundo queria aparecer lá."]
    criterios_inclusao: "Incluir quando o comentario associar o evento a prestigio, imagem social ou exclusividade."
    criterios_exclusao: "Nao incluir setor VIP operacional sem indicio de valor simbolico ou status."
    peso_inicial: 2
    observacoes: "Pode envolver ironia ou critica social; evitar conclusao estrategica nesta etapa."

  - id: "recomendacao_espontanea"
    nome: "recomendação espontânea"
    descricao: "Captura indicacao voluntaria para outras pessoas, convite informal ou defesa espontanea da experiencia."
    tipo_categoria: "experiencial"
    palavras_chave: ["recomendo", "indico", "vai", "vao", "vão", "chama", "levem", "precisam conhecer", "vale a pena"]
    expressoes_equivalentes: ["recomendo demais", "todo mundo precisa ir", "levem seus amigos", "vale muito a pena conhecer"]
    exemplos_comentarios: ["Recomendo demais para quem ainda não foi.", "Todo mundo precisa viver isso pelo menos uma vez."]
    criterios_inclusao: "Incluir quando o comentario fizer indicacao espontanea ou convite para terceiros."
    criterios_exclusao: "Nao incluir elogio sem orientacao para outra pessoa participar ou conhecer."
    peso_inicial: 3
    observacoes: "Diferenciar de intencao de retorno: aqui o foco e recomendar para outras pessoas."
